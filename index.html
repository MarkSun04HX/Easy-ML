<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
        }
        .model-card {
            background: #444;
            border-radius: 5px;
            margin: 10px 0;
            padding: 15px;
            transition: transform 0.2s;
        }
        .model-card:hover {
            transform: scale(1.05);
        }
        .prediction-form {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .prediction-form input {
            margin: 10px 0;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        .submit-button {
            background: #00cc44;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Model Predictions</h1>
        <form class="prediction-form" id="predictionForm">
            <input type="number" id="age" placeholder="Age" required>
            <input type="number" id="income" placeholder="Income" required>
            <input type="number" id="score" placeholder="Score" required>
            <input type="number" id="hours" placeholder="Hours" required>
            <button type="submit" class="submit-button">Predict</button>
        </form>
        <div id="results"></div>
    </div>
    <script>
        document.getElementById('predictionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // Simulated input retrieval
            const age = parseInt(document.getElementById('age').value);
            const income = parseInt(document.getElementById('income').value);
            const score = parseInt(document.getElementById('score').value);
            const hours = parseInt(document.getElementById('hours').value);
            // Simulated model predictions
            const models = [
                { name: 'Random Forest', rmse: 5.6, accuracy: 0.85 },
                { name: 'XGBoost', rmse: 4.3, accuracy: 0.90 }
            ];
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            models.forEach(model => {
                const prediction = Math.random() * 100; // Simulated prediction
                const rmse = model.rmse;
                const confidenceInterval = `${(prediction - rmse).toFixed(2)} - ${(prediction + rmse).toFixed(2)}`;
                resultsDiv.innerHTML += `<div class='model-card'>\n                    <h2>${model.name}</h2>\n                    <p>Prediction: ${prediction.toFixed(2)}</p>\n                    <p>RMSE: ${model.rmse}</p>\n                    <p>Accuracy: ${model.accuracy * 100}%</p>\n                    <p>Confidence Interval: ${confidenceInterval}</p>\n                </div>`;
            });
        });
    </script>
</body>
</html>
